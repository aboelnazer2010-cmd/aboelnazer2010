name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # تم التحديث هنا إلى v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # تم التحديث هنا إلى v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Install Capacitor CLI & Core
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Next.js (Static Export)
        run: npm run build

      - name: Init & Sync Capacitor Android
        run: |
          npx cap init "Share AboElnazer" "com.aboelnazer.app" --web-dir out --force
          npx cap add android || true
          npx cap sync android

      - name: Grant Execute Permission for Gradlew
        working-directory: ./android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4 # تم التحديث هنا إلى v4
        with:
          name: Share-AboElnazer-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
