name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Install Capacitor CLI & Core
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Next.js (Static Export)
        run: npm run build

      # هنا يكمن السحر: سنصنع ملف الإعدادات بأنفسنا لنتجاوز الأداة المزعجة
      - name: Create Capacitor Config Manually
        run: |
          echo '{ "appId": "com.aboelnazer.app", "appName": "ShareAboElnazer", "webDir": "out", "bundledWebRuntime": false }' > capacitor.config.json

      - name: Add and Sync Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Grant Execute Permission for Gradlew
        working-directory: ./android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Share-AboElnazer-App
          path: android/app/build/outputs/apk/debug/app-debug.apk        run: chmod +x gradlew

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4 # تم التحديث هنا إلى v4
        with:
          name: Share-AboElnazer-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
